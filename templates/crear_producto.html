{% load static %}

<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<title>Crear Producto</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Orbitron', sans-serif;
    background: url('{% static "imagenes/fondo.avif" %}') no-repeat center center fixed;
    background-size: cover;
}

/* OVERLAY */
.overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(2,6,23,0.9);
    backdrop-filter: blur(10px);
}

/* CONTENEDOR */
.container {
    position: relative;
    z-index: 2;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

/* CARD */
.card {
    width: 520px;
    padding: 35px;
    border-radius: 20px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(15px);
    border: 1px solid rgba(0,198,255,0.3);
    box-shadow: 0 0 40px rgba(0,198,255,0.2);
    color: white;
}

/* TITULO */
.card h2 {
    text-align: center;
    margin-bottom: 20px;
    font-size: 32px;
    background: linear-gradient(90deg,#00c6ff,#ff00ff,#00ff88);
    -webkit-background-clip: text;
    color: transparent;
}

/* INPUT */
.group {
    position: relative;
    margin-bottom: 18px;
}

.group input,
.group textarea {
    width: 100%;
    padding: 12px;
    border-radius: 12px;
    border: 1px solid rgba(0,198,255,0.2);
    background: rgba(0,0,0,0.7);
    color: white;
    outline: none;
}

/* FLOAT LABEL */
.group input::placeholder,
.group textarea::placeholder {
    color: transparent;
}

.group label {
    position: absolute;
    top: 12px;
    left: 12px;
    font-size: 12px;
    color: #888;
    transition: 0.3s;
}

.group input:focus + label,
.group input:not(:placeholder-shown) + label,
.group textarea:focus + label,
.group textarea:not(:placeholder-shown) + label {
    top: -8px;
    left: 10px;
    font-size: 10px;
    color: #00c6ff;
    background: #020617;
    padding: 2px 6px;
}

/* DROP ZONE */
.drop-zone {
    border: 2px dashed #00c6ff55;
    border-radius: 15px;
    padding: 25px;
    text-align: center;
    cursor: pointer;
    transition: 0.3s;
}

.drop-zone:hover {
    background: rgba(0,198,255,0.1);
}

.drop-zone.dragover {
    background: rgba(0,198,255,0.2);
}

/* PREVIEW */
.preview img {
    max-width: 100%;
    border-radius: 10px;
    margin-top: 10px;
}

/* BOTONES */
.buttons {
    text-align: center;
    margin-top: 20px;
}

.btn {
    padding: 12px 30px;
    border-radius: 25px;
    border: 1px solid #00c6ff;
    background: transparent;
    color: #00c6ff;
    cursor: pointer;
    transition: 0.3s;
    margin: 5px;
}

.btn:hover {
    background: #00c6ff;
    color: black;
    box-shadow: 0 0 20px #00c6ff;
}

.btn-cancel {
    border-color: red;
    color: red;
}

.btn-cancel:hover {
    background: red;
    color: white;
}
</style>

</head>

<body>

<div class="overlay"></div>

<div class="container">
<form method="POST" enctype="multipart/form-data" class="card">
    {% csrf_token %}

<h2>🎮 Crear Producto</h2>

<div class="group">
    <input type="text" id="nombre" name="nombre" placeholder=" " required>
    <label for="nombre">Nombre</label>
</div>

<div class="group">
    <input type="text" id="precio" name="precio" placeholder=" " required>
    <label for="precio">Precio</label>
</div>

<div class="group">
    <input type="number" id="cantidad" name="cantidad" min="1" placeholder=" " required>
    <label for="cantidad">Cantidad</label>
</div>

<div class="group">
    <input type="number" id="garantia" name="dias_garantia" min="0" placeholder=" " required>
    <label for="garantia">Garantía (días)</label>
</div>

<div class="group">
    <textarea id="descripcion" name="descripcion" rows="4" placeholder=" " required></textarea>
    <label for="descripcion">Descripción</label>
</div>

<div class="drop-zone" id="dropZone">
    <p>🖼️ Arrastra una imagen o haz clic aquí</p>
    <input type="file" name="imagen" id="fileInput" accept="image/*" hidden>
</div>

<div class="preview" id="preview"></div>

<div class="buttons">
    <button type="submit" class="btn">Crear Producto</button>
    <a href="{% url 'dashboard_vendedor' %}" class="btn btn-cancel">Cancelar</a>
</div>

</form>
</div>

<script>
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
const preview = document.getElementById('preview');

dropZone.onclick = () => fileInput.click();

fileInput.addEventListener('change', () => handleFile(fileInput.files[0]));

dropZone.addEventListener('dragover', e => {
    e.preventDefault();
    dropZone.classList.add('dragover');
});

dropZone.addEventListener('dragleave', () => {
    dropZone.classList.remove('dragover');
});

dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('dragover');

    const file = e.dataTransfer.files[0];
    if (file && file.type.startsWith('image/')) {
        fileInput.files = e.dataTransfer.files;
        handleFile(file);
    }
});

function handleFile(file){
    preview.innerHTML = "";
    if(file){
        const img = document.createElement('img');
        const url = URL.createObjectURL(file);
        img.src = url;
        preview.appendChild(img);
    }
}

/* FORMATO PRECIO */
const precioInput = document.getElementById('precio');

precioInput.addEventListener('input', function() {
    let valor = this.value.replace(/\D/g, '');
    this.value = valor ? new Intl.NumberFormat('es-CO').format(valor) : '';
});
</script>

</body>
</html>
